<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    * {
	padding: 0px;
	margin: 0px;
	border: none;
    }

    *,
    *::before,
    *::after {
        box-sizing: border-box;
    }

    a, a:link, a:visited  {
        text-decoration: none;
    }

    a:hover  {
        text-decoration: none;
    }

    aside, nav, footer, header, section, main {
        display: block;
    }

    h1, h2, h3, h4, h5, h6, p {
        font-size: inherit;
        font-weight: inherit;
    }

    ul, ul li {
        list-style: none;
    }

    img {
        vertical-align: top;
    }

    img, svg {
        max-width: 100%;
        height: auto;
    }

    address {
    font-style: normal;
    }

    input, textarea, button, select {
        font-family: inherit;
        font-size: inherit;
        color: inherit;
        background-color: transparent;
    }

    input::-ms-clear {
        display: none;
    }

    button, input[type="submit"] {
        display: inline-block;
        box-shadow: none;
        background-color: transparent;
        background: none;
        cursor: pointer;
    }

    input:focus, input:active,
    button:focus, button:active {
        outline: none;
    }

    button::-moz-focus-inner {
        padding: 0;
        border: 0;
    }

    label {
        cursor: pointer;
    }

    legend {
        display: block;
    }
    .header{
        min-width: 100vw;
        height: 10vh;
        border-bottom: 2px solid #000;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    h1{
        font-size: 40px;
        font-weight: bold;
    }
    .main{
        width: 72vw;
        height: 70vh;
        border-bottom: 2px solid #000;
        display: flex;
        justify-content: center;
        align-items: center;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .block{
        min-width: 24vw;
        min-height: 65vh;
        border-top: 1px solid #000;
        border-right: 1px solid #000;
        border-bottom: 1px solid #000;
        font-size: 40px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
    }
    footer{
        min-width: 100vw;
        height: 20vh;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 20vh;
    }

    body{
        height: 100vh;
        width: 100vw;
    }
    .content-container {
        display: flex; 
        width: 100vw;
        height: 70vh; 
    }
    .sidebar {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        width: 28vw;
        border-bottom: 2px solid #000;
        border-left: 2px solid #000;
        padding: 20px; 
        box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1); 
    }
    </style>
</head>
<body>
    <section class="header">
        <h1></h1>
    </section>
    <!-- Основной контейнер -->
    <section class="content-container">
        <!-- Основная -->
        <section class="main">
            <div class="block">
                <p></p>
            </div>
            <div class="block">
                <p></p>
            </div>
            <div class="block">
                <p></p>
            </div>
        </section>
        <!-- Боковой блок -->
        <aside class="sidebar">
            <h2></h2>
            <p></p>
        </aside>
    </section>
    <!-- Футер -->
    <footer>
        <h1></h1>
    </footer>
</body>
</html>
